name: rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
      # rust/build.rs downloads its own antlr4rust fork jar (4.8-2-Rust0.3.0-beta,
      # the only release that supports -Dlanguage=Rust). Do NOT use the shared
      # setup-antlr action here — it pins ANTLR_JAR to the mainline 4.13.2 jar,
      # which errors with "ANTLR cannot generate Rust code as of version 4.13.2".
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v5
        with:
          path: ~/.cache/antlr4rust
          key: antlr4rust-4.8-2-Rust0.3.0-beta
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo build --release
      - run: ./target/release/ch-sql-validate ../tests/corpus/select/basic.sql
